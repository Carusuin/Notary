{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistem Notaris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-blue-light {
            background-color: #f0f7ff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(214,100%,94%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(210,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(214,100%,92%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-blue-light min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Decorative Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-100/50 blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[30%] h-[30%] rounded-full bg-indigo-50/50 blur-[100px]"></div>
    </div>

    <div class="w-full max-w-[440px] animate-in fade-in zoom-in duration-500 relative">
        
        <!-- Overlapping Circular Icon -->
        <div class="absolute -top-14 left-1/2 -translate-x-1/2 z-10">
            <div class="w-28 h-28 bg-white rounded-full border-8 border-white shadow-xl flex items-center justify-center overflow-hidden">
                <img src="{% static 'img/login.png' %}?v={% now 'U' %}" alt="Logo" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="bg-white rounded-[60px] shadow-2xl shadow-blue-900/10 p-10 pt-20 relative overflow-hidden border border-gray-50">
            
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none text-gray-500">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <input type="text" name="username" id="username" required autofocus
                        class="w-full pl-16 pr-6 py-5 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-gray-700 placeholder:text-gray-400 font-medium"
                        placeholder="Username">
                </div>

                <!-- Password Field -->
                <div class="relative" x-data="{ show: false }">
                    <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none text-gray-500">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                    </div>
                    <input :type="show ? 'text' : 'password'" name="password" id="password" required
                        class="w-full pl-16 pr-14 py-5 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-gray-700 placeholder:text-gray-400 font-medium"
                        placeholder="Password">
                    <button type="button" @click="show = !show" class="absolute inset-y-0 right-6 flex items-center text-gray-400 hover:text-blue-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" x-show="!show">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" x-show="show" style="display: none;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.076m1.903-1.903A9.952 9.952 0 0112 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
                        </svg>
                    </button>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center cursor-pointer group">
                        <div class="relative">
                            <input id="remember-me" name="remember-me" type="checkbox" class="sr-only">
                            <div class="w-5 h-5 bg-gray-100 border-2 border-gray-200 rounded transition-all group-hover:border-blue-400"></div>
                            <svg class="absolute inset-0 w-5 h-5 text-blue-600 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <span class="ml-3 text-sm font-medium text-gray-400">Remember me</span>
                    </label>
                    <a href="#" class="text-sm font-medium text-gray-300 hover:text-blue-500 transition-colors">Forgot Password?</a>
                </div>

                {% if form.errors %}
                <div class="px-6 py-3 bg-red-50 rounded-2xl border border-red-100">
                    <p class="text-xs text-red-600 font-semibold text-center uppercase tracking-wider">Invalid Username or Password</p>
                </div>
                {% endif %}

                <!-- Login Button -->
                <button type="submit" 
                    class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-full shadow-xl shadow-blue-200 transition-all active:scale-[0.98] mt-4 uppercase tracking-widest">
                    Login
                </button>
            </form>
        </div>
        
        <p class="text-center mt-8 text-gray-400 text-xs font-bold uppercase tracking-[0.2em]">
            E-Notary System &bull; 2026
        </p>
    </div>

    <style>
        /* Custom checkbox style to match reference */
        input:checked + div {
            background-color: #f3f4f6; /* Keep it light */
            border-color: #3b82f6;
        }
        input:checked ~ svg {
            display: block;
        }
    </style>

    <!-- Alpine.js for show/hide password logic -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
