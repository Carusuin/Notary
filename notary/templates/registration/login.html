{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistem Notaris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-dynamic-blue {
            background: #020617;
            background: radial-gradient(circle, #1e40af 0%, #020617 100%);
            position: relative;
        }
        .bg-dynamic-blue::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            z-index: -1;
        }

        /* Loading Screen Styles */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex; /* Tampil saat pertama buka untuk fade out */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-in, visibility 0.4s;
        }
        .loader-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo-silhouette {
            filter: brightness(0) invert(1) drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }
        .loading-fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body class="bg-dynamic-blue min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Elegant Loading Screen Overlay -->
    <div id="loading-screen" class="bg-dynamic-blue">
        <!-- Animated Wave Background for Loader -->
        <div class="absolute inset-0 z-0 pointer-events-none opacity-30">
            <svg class="w-full h-full" viewBox="0 0 1440 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0,400 C320,300 480,500 720,400 C960,300 1120,500 1440,400" fill="none" stroke="white" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4" />
                <path d="M0,450 C400,350 600,600 900,450 C1200,300 1440,500 1440,500" fill="none" stroke="white" stroke-width="1" opacity="0.2" />
            </svg>
        </div>
        
        <div class="relative z-10 flex flex-col items-center">
            <div class="mb-10 relative">
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="h-24 w-auto logo-silhouette">
            </div>
            <div class="loader-spinner"></div>
            <p id="loading-text" class="mt-6 text-white/40 text-[10px] font-bold uppercase tracking-[0.3em]">Authenticating User</p>
        </div>
    </div>

    <!-- Background Decorative Elements (Waves) -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none opacity-30">
        <svg class="absolute w-full h-full" viewBox="0 0 1440 800" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,400 C320,300 480,500 720,400 C960,300 1120,500 1440,400" fill="none" stroke="white" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5" />
            <path d="M0,450 C400,350 600,600 900,450 C1200,300 1440,500 1440,500" fill="none" stroke="white" stroke-width="1" opacity="0.2" />
            <path d="M-100,600 C200,500 400,800 800,600 C1200,400 1540,700 1540,700" fill="none" stroke="white" stroke-width="1.5" opacity="0.1" />
            
            <!-- Additional fluid curves -->
            <path d="M0,200 Q360,400 720,200 T1440,200" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" />
            <path d="M0,100 Q360,300 720,100 T1440,100" fill="none" stroke="white" stroke-width="0.5" opacity="0.1" />
        </svg>
    </div>

    <div class="w-full max-w-[380px] animate-in fade-in zoom-in duration-700 relative">
        
        <!-- Overlapping Circular Icon -->
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 z-10">
            <div class="w-20 h-20 bg-white rounded-full border-4 border-white shadow-lg flex items-center justify-center overflow-hidden">
                <img src="{% static 'img/login.png' %}?v={% now 'U' %}" alt="Logo" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl shadow-blue-900/10 p-8 pt-14 relative overflow-hidden border border-gray-50">
            
            <form id="login-form" method="POST" class="space-y-4">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-gray-500">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <input type="text" name="username" id="username" required autofocus
                        class="w-full pl-12 pr-5 py-3 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-sm text-gray-700 placeholder:text-gray-400 font-medium"
                        placeholder="Username">
                </div>

                <!-- Password Field -->
                <div class="relative" x-data="{ show: false }">
                    <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-gray-500">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                    </div>
                    <input :type="show ? 'text' : 'password'" name="password" id="password" required
                        class="w-full pl-12 pr-12 py-3 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-sm text-gray-700 placeholder:text-gray-400 font-medium"
                        placeholder="Password">
                    <button type="button" @click="show = !show" class="absolute inset-y-0 right-5 flex items-center text-gray-400 hover:text-blue-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" x-show="!show">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" x-show="show" style="display: none;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.076m1.903-1.903A9.952 9.952 0 0112 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
                        </svg>
                    </button>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center cursor-pointer group">
                        <div class="relative">
                            <input id="remember-me" name="remember-me" type="checkbox" class="sr-only">
                            <div class="w-4 h-4 bg-gray-100 border-2 border-gray-200 rounded transition-all group-hover:border-blue-400"></div>
                            <svg class="absolute inset-0 w-4 h-4 text-blue-600 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <span class="ml-2 text-xs font-medium text-gray-400">Remember me</span>
                    </label>
                    <a href="#" class="text-xs font-medium text-gray-300 hover:text-blue-500 transition-colors">Forgot Password?</a>
                </div>

                {% if form.errors %}
                <div class="px-4 py-2 bg-red-50 rounded-xl border border-red-100">
                    <p class="text-[10px] text-red-600 font-semibold text-center uppercase tracking-wider">Invalid Username or Password</p>
                </div>
                {% endif %}

                <!-- Login Button -->
                <button type="submit" 
                    class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold text-base rounded-full shadow-lg shadow-blue-200 transition-all active:scale-[0.98] mt-2 uppercase tracking-widest">
                    Login
                </button>
            </form>
        </div>
        
        <p class="text-center mt-6 text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">
            E-Notary System &bull; 2026
        </p>
    </div>

    <style>
        /* Custom checkbox style to match reference */
        input:checked + div {
            background-color: #f3f4f6; /* Keep it light */
            border-color: #3b82f6;
        }
        input:checked ~ svg {
            display: block;
        }
    </style>

    <!-- Alpine.js for show/hide password logic -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const loader = document.getElementById('loading-screen');
        const loaderText = document.getElementById('loading-text');

        // 1. Initial Splash Screen (Saat halaman login dibuka)
        window.addEventListener('load', () => {
            if (loader) {
                setTimeout(() => {
                    loader.classList.add('loading-fade-out');
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 800);
                }, 1000);
            }
        });

        // 2. Submit Splash Screen (Transisi menuju Dashboard)
        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                if (loginForm.dataset.submitting === 'true') return;
                
                e.preventDefault();
                loginForm.dataset.submitting = 'true';

                if (loader) {
                    // Reset loader untuk proses autentikasi
                    loaderText.innerText = 'Preparing your dashboard';
                    loader.style.display = 'flex';
                    
                    // Trigger reflow agar transition berjalan
                    void loader.offsetWidth; 
                    
                    loader.classList.remove('loading-fade-out');
                    loader.style.opacity = '1';
                    loader.style.visibility = 'visible';
                    
                    // Set trigger for dashboard loader
                    localStorage.setItem('show_login_fade', 'true');
                    
                    // Delay sedikit agar user bisa melihat transisi sebelum submit ke server
                    setTimeout(() => {
                        loginForm.submit();
                    }, 600);
                } else {
                    loginForm.submit();
                }
            });
        }
    </script>
</body>
</html>
