{% extends 'navbar.html' %}

{% block content %}
<div class="animate-in fade-in duration-500">
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Manajemen Akta</h1>
            <p class="text-gray-500 text-sm">Kelola arsip akta Notaris dan PPAT</p>
        </div>
        <button hx-get="/deeds/add/" 
                hx-target="#modal-container"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl flex items-center shadow-sm transition-all active:scale-95">
            <span class="mr-2">+</span> Buat Akta Baru
        </button>
    </div>

    <div class="bg-white p-4 rounded-[24px] border border-gray-100 shadow-sm mb-6">
        <div class="flex gap-3">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" name="search" 
                       hx-get="/deeds/" 
                       hx-trigger="keyup changed delay:500ms" 
                       hx-target="#deed-table-body"
                       class="block w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl leading-5 bg-gray-50/50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 sm:text-sm transition-all" 
                       placeholder="Cari nomor akta, jenis, atau nama klien...">
            </div>
            <select name="kategori" 
                    hx-get="/deeds/" 
                    hx-target="#deed-table-body"
                    class="px-4 py-2 border border-gray-200 rounded-xl bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm">
                <option value="">Semua Kategori</option>
                <option value="NOTARIS">Notaris</option>
                <option value="PPAT">PPAT</option>
            </select>
        </div>
    </div>

    <div class="bg-white border border-gray-100 rounded-[24px] overflow-hidden shadow-sm">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50/50 border-b border-gray-100">
                    <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Nomor Akta</th>
                    <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Jenis & Klien</th>
                    <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Tanggal</th>
                    <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Aksi</th>
                </tr>
            </thead>
            <tbody id="deed-table-body">
                {% include 'deeds/deed_table.html' %}
            </tbody>
        </table>
    </div>
</div>

<div id="modal-container"></div>
{% endblock %}
