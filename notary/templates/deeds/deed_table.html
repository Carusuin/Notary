{% for deed in deeds %}
<tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors group">
  <td class="px-6 py-4">
    <span class="font-mono text-sm font-bold text-blue-600">{{ deed.nomor_akta }}</span>
    <div class="mt-1">
      <span class="px-2 py-0.5 text-[10px] font-bold rounded-md {% if deed.kategori == 'NOTARIS' %}bg-purple-50 text-purple-600{% else %}bg-orange-50 text-orange-600{% endif %}">
        {{ deed.kategori }}
      </span>
    </div>
  </td>
  
  <td class="px-6 py-4">
    <div class="text-sm font-bold text-gray-900">{{ deed.jenis_akta }}</div>
    <div class="text-xs text-gray-500 mt-0.5 flex items-center">
      <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path>
      </svg>
      {{ deed.client.nama_lengkap }}
    </div>

    <div class="mt-2 flex gap-3">
      {% if deed.file_scan %}
      <a href="{{ deed.file_scan.url }}" target="_blank" class="text-blue-600 hover:text-blue-800 text-xs font-medium flex items-center">
        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>
        Lihat Arsip
      </a>
      {% else %}
      <span class="text-gray-400 italic text-[10px]">Belum diupload</span>
      {% endif %}
    </div>
  </td>

  <td class="px-6 py-4 text-sm text-gray-600">
    {{ deed.tanggal_buat|date:"d F Y" }}
  </td>

  <td class="px-6 py-4 text-right">
    <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
      <a href="{% url 'export_pdf' deed.id %}" target="_blank" title="Cetak Tanda Terima" class="p-2 text-gray-400 hover:text-green-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
        </svg>
      </a>

      <button hx-get="/deeds/edit/{{ deed.id }}/" hx-target="#modal-container" title="Edit Data" class="p-2 text-gray-400 hover:text-blue-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
        </svg>
      </button>

      <button hx-delete="/deeds/delete/{{ deed.id }}/" hx-confirm="Hapus akta ini?" hx-target="#deed-table-body" title="Hapus Data" class="p-2 text-gray-400 hover:text-red-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
        </svg>
      </button>
    </div>
  </td>
</tr>
{% empty %}
<tr>
  <td colspan="4" class="px-6 py-12 text-center text-gray-400 text-sm">
    Belum ada data akta yang tercatat.
  </td>
</tr>
{% endfor %}
