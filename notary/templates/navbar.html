{% load static %}
<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notary System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

      /* 1. Sembunyikan scrollbar fisik */
      html {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      ::-webkit-scrollbar {
        display: none;
        width: 0 !important;
      }

      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.02em;
        background-color: #f9fafb;
      }

      .bg-nav-dynamic {
        background: #020617;
        background: radial-gradient(circle at center, #1e40af 0%, #020617 100%);
        position: relative;
        overflow: hidden;
      }

      /* Active Link Style */
      .nav-link.active {
        color: white !important;
        text-decoration: underline;
        text-underline-offset: 8px;
        text-decoration-thickness: 2px;
      }

      /* Loading Screen Styles */
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease-in, visibility 0.4s;
      }
      .loader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /* Page Transition Animation */
      @keyframes pageMoveIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .page-move-in {
        animation: pageMoveIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
    </style>
  </head>

  <body class="bg-gray-50 m-0 p-0 h-full overflow-x-hidden">
    <div id="loading-screen" class="bg-nav-dynamic">
      <div class="relative z-10 flex flex-col items-center">
        <div class="mb-10">
          <img src="{% static 'img/logo.png' %}" alt="Logo" class="h-24 w-auto brightness-0 invert">
        </div>
        <div class="loader-spinner"></div>
        <p id="loading-text" class="mt-6 text-white/40 text-[10px] font-bold uppercase tracking-[0.3em]">Initializing System</p>
      </div>
    </div>

    <nav class="bg-nav-dynamic shadow-xl px-8 py-4 sticky top-0 z-50 border-b border-white/5">
      <div class="max-w-7xl mx-auto flex items-center h-full">
        <!-- Logo -->
        <div class="flex-1 flex items-center justify-start">
          <a href="/" class="flex items-center">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="h-10 w-auto">
          </a>
        </div>

        <!-- Navigation Links -->
        <div class="hidden md:flex items-center justify-center space-x-10" hx-target="#main-content" hx-push-url="true">
          <a href="/" hx-get="/" class="nav-link font-medium transition-all duration-200 {% if request.path == '/' %}active{% else %}text-white/70 hover:text-white{% endif %}">Dashboard</a>
          <a href="/clients/" hx-get="/clients/" class="nav-link font-medium transition-all duration-200 {% if '/clients/' in request.path %}active{% else %}text-white/70 hover:text-white{% endif %}">Client</a>
          <a href="/deeds/" hx-get="/deeds/" class="nav-link font-medium transition-all duration-200 {% if '/deeds/' in request.path %}active{% else %}text-white/70 hover:text-white{% endif %}">Akta</a>
          <a href="/arsip/" hx-get="/arsip/" class="nav-link font-medium transition-all duration-200 {% if '/arsip/' in request.path %}active{% else %}text-white/70{% endif %} hover:text-white">Arsip</a>
          <a href="/billing/" hx-get="/billing/" class="nav-link font-medium transition-all duration-200 {% if '/billing/' in request.path %}active{% else %}text-white/70{% endif %} hover:text-white">Billing</a>
        </div>

        <!-- Profile & Logout -->
        <div class="flex-1 flex items-center justify-end space-x-6 text-white">
          <div class="text-right hidden sm:block">
            <p class="text-[10px] opacity-70 leading-none uppercase tracking-wider font-bold mb-0.5">Administrator</p>
            <p class="text-sm font-bold text-white tracking-tight">{{ user.username }}</p>
          </div>
          <div class="w-10 h-10 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20 shadow-inner">
            <span class="font-black text-xs text-white uppercase">{{ user.username|slice:":2" }}</span>
          </div>
          <form id="logout-form" action="{% url 'logout' %}" method="post" class="m-0 p-0 flex">
            {% csrf_token %}
            <button type="submit" class="p-2.5 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white rounded-xl transition-all duration-300" title="Keluar">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
            </button>
          </form>
        </div>
      </div>
    </nav>

    <main id="main-content" class="max-w-7xl mx-auto px-6 pt-8 pb-20">
      {% block content %} {% endblock %}
    </main>

    {% block extra_body %}{% endblock %}

    <script>
      // CSRF for HTMX
      document.body.addEventListener("htmx:configRequest", (event) => {
        event.detail.headers["X-CSRFToken"] = "{{ csrf_token }}";
      });

      // Update active nav links
      document.body.addEventListener("htmx:afterOnLoad", (event) => {
        if (event.detail.target.id === "main-content") {
          const currentPath = window.location.pathname;
          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPath = link.getAttribute("href");
            const isActive = (linkPath === "/" && currentPath === "/") || 
                           (linkPath !== "/" && currentPath.startsWith(linkPath));
            
            if (isActive) {
              link.classList.add("active");
              link.classList.remove("text-white/70");
            } else {
              link.classList.remove("active");
              link.classList.add("text-white/70");
            }
          });
        }
      });

      // Loading Screen
      const loader = document.getElementById('loading-screen');
      if (localStorage.getItem('show_login_fade') === 'true' && loader) {
        loader.style.display = 'flex';
        window.addEventListener('load', () => {
          setTimeout(() => {
            loader.classList.add('loading-fade-out');
            localStorage.removeItem('show_login_fade');
            setTimeout(() => { loader.style.display = 'none'; }, 400);
          }, 500);
        });
      }
    </script>
  </body>
</html>
