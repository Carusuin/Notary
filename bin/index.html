<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistem Notaris{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; color: white; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover { background: #34495e; color: white; }
        .sidebar a.active { background: #1abc9c; color: white; }
        .content-area { padding: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar shadow">
            <div class="py-4 text-center">
                <h4><i class="fas fa-file-signature"></i> NOTARY</h4>
                <hr>
            </div>
            <div class="nav flex-column">
                <a href="/" class="active"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a href="/clients/"><i class="fas fa-users me-2"></i> Penghadap (Klien)</a>
                <a href="/deeds/"><i class="fas fa-book me-2"></i> Daftar Akta</a>
                <a href="/finance/"><i class="fas fa-wallet me-2"></i> Keuangan</a>
                <a href="/admin/" target="_blank"><i class="fas fa-user-shield me-2"></i> Admin Panel</a>
                <hr>
                <a href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto content-area">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom bg-white p-3 shadow-sm rounded">
                <h1 class="h2">{% block header %}Dashboard{% endblock %}</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <span class="badge bg-primary p-2"><i class="far fa-calendar-alt me-1"></i> 11 Maret 2026</span>
                </div>
            </div>

            <div class="container-fluid">
                {% block content %}
                <div class="alert alert-info">Selamat datang di Sistem Informasi Kenotariatan. Silakan pilih menu di samping.</div>
                {% endblock %}
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>xx
